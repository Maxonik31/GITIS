<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        .cmds { margin-top: 20px; }
        .status { position: fixed; bottom: 0; width: 100%; text-align: center; padding: 10px 0; }
    </style>
</head>
<body>

    <button id="power">Вкл/Выкл</button>

    <div class="cmds">
        <button id="c1" disabled>Сжать</button>
        <button id="c2" disabled>Разжать</button>
    </div>

    <div class="status" id="status">Статус: Выключено</div>

    <script>
        let on = false;
        const p = document.getElementById('power');
        const c1 = document.getElementById('c1');
        const c2 = document.getElementById('c2');
        const s = document.getElementById('status');

        async function sendToServer(btn) {
            await fetch('/api', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({button: btn})
            });
        }

        p.onclick = () => {
            on = !on;
            c1.disabled = !on;
            c2.disabled = !on;
            s.textContent = on ? 'Статус: On' : 'Статус: Off';
            
            sendToServer(on ? 'power_on' : 'power_off');
        };
        
        c1.onclick = () => {
            s.textContent = 'Статус: Сжимается';
            sendToServer('cmd1');
        };
        
        c2.onclick = () => {
            s.textContent = 'Статус: Разжимается';
            sendToServer('cmd2');
        }; 
    </script>
</body>
</html>
